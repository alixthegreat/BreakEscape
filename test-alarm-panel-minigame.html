<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG-05 Facility Alarm Panel Test</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="public/break_escape/css/minigames-framework.css">
    <link rel="stylesheet" href="public/break_escape/css/alarm-panel-minigame.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: #050a14;
            font-family: 'Press Start 2P', monospace;
        }

        /* Minigame viewport: leaves 260px for the test bar */
        .ap-test-wrap {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 260px) !important;
            z-index: 1500;
            background: rgba(0, 0, 0, 0.95);
        }

        /* Test harness bar fixed at bottom */
        #test-harness {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 260px;
            z-index: 2000;
            background: #080e1b;
            border-top: 2px solid #1e2d4a;
            display: flex;
            flex-direction: column;
        }

        #test-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            border-bottom: 2px solid #1e2d4a;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .toolbar-title { font-size: 8px; color: #f59e0b; letter-spacing: 1px; margin-right: 4px; }
        .toolbar-hint  { font-size: 6px; color: #2a3a5a; letter-spacing: 0.5px; }

        .toolbar-sep { width: 2px; height: 18px; background: #1e2d4a; flex-shrink: 0; }

        .test-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            background: #101829;
            color: #c8d8ff;
            border: 2px solid #2a3a5a;
            padding: 5px 8px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            line-height: 1;
        }
        .test-btn:hover          { background: #162040; border-color: #4a6090; }
        .test-btn.green          { border-color: #065f46; color: #34d399; }
        .test-btn.green:hover    { background: #061812; border-color: #34d399; }
        .test-btn.amber          { border-color: #92400e; color: #fbbf24; }
        .test-btn.amber:hover    { background: #1a1200; border-color: #fbbf24; }
        .test-btn.red            { border-color: #7f1d1d; color: #f87171; }
        .test-btn.red:hover      { background: #1a0000; border-color: #ef4444; }
        .test-btn.active-green   { background: #052010; border-color: #00c853; color: #00c853; }
        .test-btn.active-amber   { background: #2a1a00; border-color: #f59e0b; color: #f59e0b; }
        .test-btn.active-red     { background: #1a0505; border-color: #ef4444; color: #ef4444; }

        #lamp-toggles {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-bottom: 2px solid #1e2d4a;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .toggle-label { font-size: 6px; color: #4a6090; letter-spacing: 0.5px; flex-shrink: 0; }

        #event-log {
            flex: 1;
            overflow-y: auto;
            padding: 4px 14px 6px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .log-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-family: 'VT323', monospace;
            font-size: 17px;
            line-height: 1.2;
        }
        .log-ts      { color: #1e2d4a; min-width: 58px; font-size: 14px; flex-shrink: 0; }
        .log-info    { color: #6a82aa; }
        .log-global  { color: #00e5ff; }
        .log-success { color: #00e676; }
        .log-failure { color: #ef4444; }
        .log-sep     { color: #2a3a5a; }
    </style>
</head>
<body>
    <!-- Required by MinigameFramework endMinigame cleanup -->
    <div class="popup-overlay"></div>

    <!-- Test harness panel -->
    <div id="test-harness">
        <div id="test-toolbar">
            <span class="toolbar-title">MG-05 FACILITY ALARM PANEL</span>
            <div class="toolbar-sep"></div>
            <button class="test-btn green" id="btn-restart">&#9654;&nbsp;RESTART</button>
            <button class="test-btn" id="btn-reset-all">RESET ALL LAMPS</button>
            <button class="test-btn" id="btn-clear">CLEAR LOG</button>
            <div class="toolbar-sep"></div>
            <span class="toolbar-hint">Toggle buttons fire live events — lamps update without restarting the minigame</span>
        </div>
        <div id="lamp-toggles">
            <span class="toggle-label">TRIGGER:</span>
            <!-- Buttons built by JS once LAMPS config is known -->
        </div>
        <div id="event-log"></div>
    </div>

    <!--
        Step 1: Inject importmap via document.write so it lands in the HTML
        stream before any ES module is parsed.
        AlarmPanelMinigame only imports base-minigame.js.
    -->
    <script>
    (function () {
        // MinigameScene mock — replicates base-minigame.js public interface
        var BASE_MOCK = [
            'export class MinigameScene {',
            '  constructor(container, params) {',
            '    this.container = container;',
            '    this.params = params;',
            '    this.gameState = { isActive: false, mouseDown: false, currentTool: null };',
            '    this.gameResult = null;',
            '    this._eventListeners = [];',
            '    this._esc = null;',
            '  }',
            '  init() {',
            '    var showCancel   = this.params.showCancel !== false;',
            '    var disableClose = this.params.disableClose === true;',
            "    var closeAttr = disableClose ? ' style=\"display:none\"' : '';",
            "    var cancelHtml = showCancel",
            "      ? '<div class=\"minigame-controls\"><button class=\"minigame-button\" id=\"minigame-cancel\">'",
            "          + (this.params.cancelText || 'Cancel') + '</button></div>'",
            "      : '';",
            '    this.container.innerHTML =',
            "      '<button class=\"minigame-close-button\" id=\"minigame-close\"' + closeAttr + '>\u00d7</button>' +",
            "      '<div class=\"minigame-header\"><h3>' + (this.params.title || 'Minigame') + '</h3></div>' +",
            "      '<div class=\"minigame-game-container\"></div>' +",
            "      '<div class=\"minigame-message-container\"></div>' +",
            '      cancelHtml;',
            "    this.headerElement    = this.container.querySelector('.minigame-header');",
            "    this.gameContainer    = this.container.querySelector('.minigame-game-container');",
            "    this.messageContainer = this.container.querySelector('.minigame-message-container');",
            "    this.controlsElement  = this.container.querySelector('.minigame-controls');",
            '    var self = this;',
            '    if (!disableClose) {',
            "      var cb = this.container.querySelector('#minigame-close');",
            '      if (cb) cb.addEventListener("click", function () { self.complete(false); });',
            '    }',
            "    var xb = this.container.querySelector('#minigame-cancel');",
            '    if (xb) xb.addEventListener("click", function () { self.complete(false); });',
            '    if (!this.params.headerElement && this.headerElement) {',
            '      this.headerElement.style.display = "none";',
            '    }',
            '  }',
            '  start() {',
            '    this.gameState.isActive = true;',
            '    if (this.params.disableClose !== true) {',
            '      var self = this;',
            '      this._esc = function (e) { if (e.key === "Escape") self.complete(false); };',
            '      document.addEventListener("keydown", this._esc);',
            '    }',
            '  }',
            '  complete(success, result) {',
            '    if (this._esc) { document.removeEventListener("keydown", this._esc); this._esc = null; }',
            '    if (window.MinigameFramework) window.MinigameFramework.endMinigame(success, result);',
            '  }',
            '  cleanup() {',
            '    if (this._esc) { document.removeEventListener("keydown", this._esc); this._esc = null; }',
            '    this._eventListeners.forEach(function (h) {',
            '      try { h.el.removeEventListener(h.event, h.fn); } catch (e) {}',
            '    });',
            '    this._eventListeners = [];',
            '  }',
            '  addEventListener(el, event, fn) {',
            '    if (!el) return;',
            '    el.addEventListener(event, fn);',
            '    this._eventListeners.push({ el: el, event: event, fn: fn });',
            '  }',
            '  showSuccess(msg) { console.log("[mock MinigameScene] showSuccess:", msg); }',
            '  showFailure(msg) { console.log("[mock MinigameScene] showFailure:", msg); }',
            '}'
        ].join('\n');

        var importMap = JSON.stringify({
            imports: {
                '/public/break_escape/js/minigames/framework/base-minigame.js':
                    'data:text/javascript,' + encodeURIComponent(BASE_MOCK)
            }
        });

        document.write('<script type="importmap">' + importMap + '<\/script>');
    }());
    </script>

    <!--
        Step 2: Import the REAL AlarmPanelMinigame.
        Its only engine import (base-minigame.js) is redirected to the mock above.
    -->
    <script type="module">
    import { AlarmPanelMinigame } from '/public/break_escape/js/minigames/alarm-panel/alarm-panel-minigame.js';

    // ── Lamp variable list (mirrors LAMPS config in the minigame) ─────────────
    const LAMP_VARS = [
        { variable: 'anomaly_detected',    label: 'BATTERY HALL 1', btnClass: 'amber' },
        { variable: 'esd_activated',       label: 'RACKS ISOLATED', btnClass: 'green' },
        { variable: 'sis_tamper_confirmed',label: 'SIS STATUS',     btnClass: 'red'   },
        { variable: 'jump_server_isolated',label: 'JUMP SERVER',    btnClass: 'amber' },
        { variable: 'network_isolated',    label: 'NETWORK STATUS', btnClass: 'red'   },
        { variable: 'hydrogen_alarm',      label: 'H\u2082 GAS',    btnClass: 'red'   },
        { variable: 'facility_safe_state', label: 'SAFE STATE',     btnClass: 'green' },
    ];

    // ── Initial globals ───────────────────────────────────────────────────────
    function makeGlobals() {
        return {
            anomaly_detected:     false,
            esd_activated:        false,
            sis_tamper_confirmed: false,
            jump_server_isolated: false,
            network_isolated:     false,
            hydrogen_alarm:       false,
            facility_safe_state:  false,
        };
    }

    window.gameState = { globalVariables: makeGlobals() };

    const mockLockable = { scenarioData: {}, layer: null };

    // ── Event dispatcher mock ─────────────────────────────────────────────────
    // Supports .on() / .off() / .emit() — used by the minigame's _subscribeEvents.
    const _listeners = {};
    window.eventDispatcher = {
        on(event, fn) {
            if (!_listeners[event]) _listeners[event] = [];
            _listeners[event].push(fn);
        },
        off(event, fn) {
            if (_listeners[event]) {
                _listeners[event] = _listeners[event].filter(f => f !== fn);
            }
        },
        emit(event, payload) {
            (_listeners[event] || []).forEach(fn => fn(payload));
        }
    };

    // ── Event log ─────────────────────────────────────────────────────────────
    const logEl = document.getElementById('event-log');

    function log(msg, type = 'info') {
        const now = new Date();
        const ts  = String(now.getMinutes()).padStart(2, '0') + ':' +
                    String(now.getSeconds()).padStart(2, '0') + '.' +
                    String(now.getMilliseconds()).padStart(3, '0').slice(0, 2);
        const row = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML = `<span class="log-ts">${ts}</span><span class="log-${type}">${msg}</span>`;
        logEl.appendChild(row);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // ── Mock MinigameFramework ────────────────────────────────────────────────
    let currentMinigame = null;

    window.MinigameFramework = {
        endMinigame(success, result) {
            const label = success ? 'COMPLETED ✓' : 'CLOSED / DISMISSED ✕';
            log(`MinigameFramework.endMinigame — ${label}`, success ? 'success' : 'failure');
            if (currentMinigame) {
                currentMinigame.params?.onComplete?.(success, result);
                currentMinigame.cleanup();
                currentMinigame = null;
            }
            document.querySelectorAll('.ap-test-wrap').forEach(el => el.remove());
        }
    };

    // ── Helper: fire a lamp variable change ───────────────────────────────────
    function triggerVariable(varName, value) {
        const oldValue = window.gameState.globalVariables[varName];
        window.gameState.globalVariables[varName] = value;
        const eventName = `global_variable_changed:${varName}`;
        window.eventDispatcher.emit(eventName, { name: varName, value, oldValue });
        log(`setGlobal: ${varName} = ${JSON.stringify(value)}  (was ${JSON.stringify(oldValue)})`, 'global');
    }

    // ── Build toggle buttons ──────────────────────────────────────────────────
    const togglesEl = document.getElementById('lamp-toggles');

    LAMP_VARS.forEach(({ variable, label, btnClass }) => {
        const btn = document.createElement('button');
        btn.className = `test-btn ${btnClass}`;
        btn.dataset.var = variable;
        btn.textContent = label;
        btn.title = `Set ${variable} = true and emit event`;
        btn.addEventListener('click', () => {
            const currentVal = window.gameState.globalVariables[variable];
            const newVal = !currentVal;
            triggerVariable(variable, newVal);
            // Update button appearance to reflect active/inactive state
            const activeClass = btnClass === 'green'  ? 'active-green'
                              : btnClass === 'amber'  ? 'active-amber'
                              : 'active-red';
            btn.classList.toggle(activeClass, newVal);
        });
        togglesEl.appendChild(btn);
    });

    // ── Launch ────────────────────────────────────────────────────────────────
    function launch() {
        const outer = document.createElement('div');
        outer.className = 'ap-test-wrap';
        document.body.insertBefore(outer, document.body.firstChild);

        currentMinigame = new AlarmPanelMinigame(outer, {
            lockable:   mockLockable,
            type:       'object',
            showCancel: true,
            cancelText: 'Close Panel',
            onComplete(success, result) {
                log(`onComplete callback — success: ${success}`, success ? 'success' : 'failure');
            }
        });

        currentMinigame.init();
        currentMinigame.start();

        log('Launched — all 7 lamps at initial state (all globals = false)', 'info');
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    document.getElementById('btn-restart').addEventListener('click', () => {
        if (currentMinigame) {
            currentMinigame.cleanup();
            currentMinigame = null;
        }
        document.querySelectorAll('.ap-test-wrap').forEach(el => el.remove());
        // Reset globals
        window.gameState.globalVariables = makeGlobals();
        // Reset toggle button appearances
        document.querySelectorAll('#lamp-toggles .test-btn').forEach(btn => {
            btn.classList.remove('active-green', 'active-amber', 'active-red');
        });
        log('─────────── RESTART ───────────', 'sep');
        launch();
    });

    document.getElementById('btn-reset-all').addEventListener('click', () => {
        LAMP_VARS.forEach(({ variable }) => {
            if (window.gameState.globalVariables[variable]) {
                triggerVariable(variable, false);
            }
        });
        // Reset toggle button appearances
        document.querySelectorAll('#lamp-toggles .test-btn').forEach(btn => {
            btn.classList.remove('active-green', 'active-amber', 'active-red');
        });
        log('─── RESET ALL — all lamps returned to initial state ───', 'sep');
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        logEl.innerHTML = '';
    });

    // ── Auto-launch ───────────────────────────────────────────────────────────
    launch();
    </script>
</body>
</html>
