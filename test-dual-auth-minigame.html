<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG-11 Dual-Auth Minigame Test</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="public/break_escape/css/minigames-framework.css">
    <link rel="stylesheet" href="public/break_escape/css/dual-auth-minigame.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background: #050a14;
            font-family: 'Press Start 2P', monospace;
        }

        /* Minigame viewport: leaves 200px for the test bar */
        .da-test-wrap {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 200px) !important;
            z-index: 1500;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Constrain panel width on wide viewports */
        .da-test-wrap .da-panel-wrap {
            max-width: 820px;
            width: 100%;
        }

        /* Test harness bar fixed at bottom */
        #test-harness {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            z-index: 2000;
            background: #080e1b;
            border-top: 2px solid #1e2d4a;
            display: flex;
            flex-direction: column;
        }

        #test-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 14px;
            border-bottom: 2px solid #1e2d4a;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .toolbar-title { font-size: 8px; color: #f59e0b; letter-spacing: 1px; margin-right: 4px; }
        .toolbar-label { font-size: 7px; color: #4a6090; letter-spacing: 1px; }
        .toolbar-hint  { font-size: 6px; color: #2a3a5a; letter-spacing: 0.5px; }

        .pin-badge {
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: #00e5ff;
            background: #070d1a;
            border: 2px solid #1e2d4a;
            padding: 1px 10px;
            letter-spacing: 4px;
        }

        .toolbar-sep { width: 2px; height: 18px; background: #1e2d4a; flex-shrink: 0; }

        .test-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            background: #101829;
            color: #c8d8ff;
            border: 2px solid #2a3a5a;
            padding: 5px 10px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            line-height: 1;
        }
        .test-btn:hover          { background: #162040; border-color: #4a6090; }
        .test-btn.green          { border-color: #065f46; color: #34d399; }
        .test-btn.green:hover    { background: #061812; border-color: #34d399; }

        #event-log {
            flex: 1;
            overflow-y: auto;
            padding: 4px 14px 6px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .log-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-family: 'VT323', monospace;
            font-size: 17px;
            line-height: 1.2;
        }
        .log-ts      { color: #1e2d4a; min-width: 58px; font-size: 14px; flex-shrink: 0; }
        .log-info    { color: #6a82aa; }
        .log-global  { color: #00e5ff; }
        .log-success { color: #00e676; }
        .log-failure { color: #ef4444; }
        .log-unlock  { color: #f59e0b; }
        .log-sep     { color: #2a3a5a; }
    </style>
</head>
<body>
    <!-- Required by MinigameFramework endMinigame cleanup -->
    <div class="popup-overlay"></div>

    <!-- Test harness panel -->
    <div id="test-harness">
        <div id="test-toolbar">
            <span class="toolbar-title">MG-11 DUAL-AUTH</span>
            <div class="toolbar-sep"></div>
            <span class="toolbar-label">IT&nbsp;SEC</span>
            <span class="pin-badge" id="badge-itsec">1234</span>
            <span class="toolbar-label">CLINICAL</span>
            <span class="pin-badge" id="badge-clinical">5678</span>
            <div class="toolbar-sep"></div>
            <button class="test-btn green" id="btn-restart">&#9654;&nbsp;RESTART</button>
            <button class="test-btn" id="btn-clear">CLEAR LOG</button>
            <div class="toolbar-sep"></div>
            <span class="toolbar-hint">Enter IT code in left panel, clinical code in right, then press AUTHORISE</span>
        </div>
        <div id="event-log"></div>
    </div>

    <!--
        Step 1: Generate <script type="importmap"> via document.write.
        This injects the importmap into the HTML stream before any ES module
        is loaded, redirecting the two engine imports to data: URI mocks.
        No blob URLs, no fetch patching needed.
    -->
    <script>
    (function () {
        // MinigameScene mock — replicates base-minigame.js public interface
        var BASE_MOCK = [
            'export class MinigameScene {',
            '  constructor(container, params) {',
            '    this.container = container;',
            '    this.params = params;',
            '    this.gameState = { isActive: false, mouseDown: false, currentTool: null };',
            '    this.gameResult = null;',
            '    this._eventListeners = [];',
            '    this._esc = null;',
            '  }',
            '  init() {',
            '    var showCancel   = this.params.showCancel !== false;',
            '    var disableClose = this.params.disableClose === true;',
            "    var closeAttr = disableClose ? ' style=\"display:none\"' : '';",
            "    var cancelHtml = showCancel",
            "      ? '<div class=\"minigame-controls\"><button class=\"minigame-button\" id=\"minigame-cancel\">'",
            "          + (this.params.cancelText || 'Cancel') + '</button></div>'",
            "      : '';",
            '    this.container.innerHTML =',
            "      '<button class=\"minigame-close-button\" id=\"minigame-close\"' + closeAttr + '>\u00d7</button>' +",
            "      '<div class=\"minigame-header\"><h3>' + (this.params.title || 'Minigame') + '</h3></div>' +",
            "      '<div class=\"minigame-game-container\"></div>' +",
            "      '<div class=\"minigame-message-container\"></div>' +",
            '      cancelHtml;',
            "    this.headerElement    = this.container.querySelector('.minigame-header');",
            "    this.gameContainer    = this.container.querySelector('.minigame-game-container');",
            "    this.messageContainer = this.container.querySelector('.minigame-message-container');",
            "    this.controlsElement  = this.container.querySelector('.minigame-controls');",
            '    var self = this;',
            '    if (!disableClose) {',
            "      var cb = this.container.querySelector('#minigame-close');",
            '      if (cb) cb.addEventListener("click", function () { self.complete(false); });',
            '    }',
            "    var xb = this.container.querySelector('#minigame-cancel');",
            '    if (xb) xb.addEventListener("click", function () { self.complete(false); });',
            '    if (!this.params.headerElement && this.headerElement) {',
            '      this.headerElement.style.display = "none";',
            '    }',
            '  }',
            '  start() {',
            '    this.gameState.isActive = true;',
            '    if (this.params.disableClose !== true) {',
            '      var self = this;',
            '      this._esc = function (e) { if (e.key === "Escape") self.complete(false); };',
            '      document.addEventListener("keydown", this._esc);',
            '    }',
            '  }',
            '  complete(success, result) {',
            '    if (this._esc) { document.removeEventListener("keydown", this._esc); this._esc = null; }',
            '    if (window.MinigameFramework) window.MinigameFramework.endMinigame(success, result);',
            '  }',
            '  cleanup() {',
            '    if (this._esc) { document.removeEventListener("keydown", this._esc); this._esc = null; }',
            '    this._eventListeners.forEach(function (h) {',
            '      try { h.el.removeEventListener(h.event, h.fn); } catch (e) {}',
            '    });',
            '    this._eventListeners = [];',
            '  }',
            '  addEventListener(el, event, fn) {',
            '    if (!el) return;',
            '    el.addEventListener(event, fn);',
            '    this._eventListeners.push({ el: el, event: event, fn: fn });',
            '  }',
            '  showSuccess(msg) { console.log("[mock MinigameScene] showSuccess:", msg); }',
            '  showFailure(msg) { console.log("[mock MinigameScene] showFailure:", msg); }',
            '}'
        ].join('\n');

        // notifyServerUnlock mock
        var UNLOCK_MOCK = [
            'export async function notifyServerUnlock(lockable, type, method) {',
            '  console.log("[MOCK] notifyServerUnlock", { type: type, method: method });',
            '  if (window._testLog) {',
            '    window._testLog("notifyServerUnlock(" + type + ", " + method + ")", "unlock");',
            '  }',
            '  return { success: true, hasContents: false };',
            '}'
        ].join('\n');

        var importMap = JSON.stringify({
            imports: {
                '/public/break_escape/js/minigames/framework/base-minigame.js':
                    'data:text/javascript,' + encodeURIComponent(BASE_MOCK),
                '/public/break_escape/js/systems/unlock-system.js':
                    'data:text/javascript,' + encodeURIComponent(UNLOCK_MOCK)
            }
        });

        document.write('<script type="importmap">' + importMap + '<\/script>');
    }());
    </script>

    <!--
        Step 2: Import the REAL DualAuthMinigame.
        Its two engine imports are silently redirected to the mocks above.
    -->
    <script type="module">
    import { DualAuthMinigame } from '/public/break_escape/js/minigames/dual-auth/dual-auth-minigame.js';

    // ── Test configuration ─────────────────────────────────────────────────

    const ITSEC_PIN    = '1234';
    const CLINICAL_PIN = '5678';

    window.gameState = {
        globalVariables: {
            itsec_pin:    ITSEC_PIN,
            clinical_pin: CLINICAL_PIN
        }
    };

    const mockLockable = {
        scenarioData: {
            id:           'dual_auth_panel',
            itsec_pin:    ITSEC_PIN,
            clinical_pin: CLINICAL_PIN
        },
        layer: null
    };

    // ── Event log ──────────────────────────────────────────────────────────

    const logEl = document.getElementById('event-log');

    function log(msg, type = 'info') {
        const now = new Date();
        const ts  = String(now.getMinutes()).padStart(2, '0') + ':' +
                    String(now.getSeconds()).padStart(2, '0') + '.' +
                    String(now.getMilliseconds()).padStart(3, '0').slice(0, 2);
        const row = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML = `<span class="log-ts">${ts}</span><span class="log-${type}">${msg}</span>`;
        logEl.appendChild(row);
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Exposed so the notifyServerUnlock mock can write to the log
    window._testLog = log;

    // ── Mock MinigameFramework ─────────────────────────────────────────────
    // DualAuthMinigame's complete() calls MinigameFramework.endMinigame().

    let currentMinigame = null;

    window.MinigameFramework = {
        endMinigame(success, result) {
            const label = success ? 'COMPLETED ✓' : 'DISMISSED / TIMED OUT ✕';
            log(`MinigameFramework.endMinigame — ${label}`, success ? 'success' : 'failure');
            if (currentMinigame) {
                currentMinigame.params?.onComplete?.(success, result);
                currentMinigame.cleanup();
                currentMinigame = null;
            }
            document.querySelectorAll('.da-test-wrap').forEach(el => el.remove());
        }
    };

    // ── Mock npcManager ────────────────────────────────────────────────────
    // DualAuthMinigame.setGlobalAndNotify() calls window.npcManager.setGlobalVariable
    // first (preferred path). This captures every global write for the log.

    window.npcManager = {
        setGlobalVariable(name, value) {
            if (window.gameState?.globalVariables) {
                window.gameState.globalVariables[name] = value;
            }
            log(`setGlobal: ${name} = ${JSON.stringify(value)}`, 'global');
        }
    };

    // ── Launch ─────────────────────────────────────────────────────────────

    function launch() {
        window.gameState.globalVariables.itsec_pin    = ITSEC_PIN;
        window.gameState.globalVariables.clinical_pin = CLINICAL_PIN;

        const outer = document.createElement('div');
        outer.className = 'da-test-wrap';
        document.body.insertBefore(outer, document.body.firstChild);

        currentMinigame = new DualAuthMinigame(outer, {
            lockable:   mockLockable,
            type:       'object',
            showCancel: true,
            cancelText: 'Close',
            onComplete(success, result) {
                log(`onComplete callback — success: ${success}`, success ? 'success' : 'failure');
            }
        });

        currentMinigame.init();
        currentMinigame.start();

        log(`Launched  |  IT SEC: ${ITSEC_PIN}   CLINICAL: ${CLINICAL_PIN}`, 'info');
    }

    // ── Controls ───────────────────────────────────────────────────────────

    document.getElementById('btn-restart').addEventListener('click', () => {
        if (currentMinigame) {
            currentMinigame.cleanup();
            currentMinigame = null;
        }
        document.querySelectorAll('.da-test-wrap').forEach(el => el.remove());
        log('─────────── RESTART ───────────', 'sep');
        launch();
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
        logEl.innerHTML = '';
    });

    // ── Auto-launch ────────────────────────────────────────────────────────

    launch();
    </script>
</body>
</html>
